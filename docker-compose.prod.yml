version: "3.9"

# Production deployment — uses Neon (Postgres) + Upstash (Redis) externally
# Only backend + frontend run on the Oracle VM

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: psx_backend
    restart: always
    ports:
      - "8080:8000"
    env_file:
      - .env.prod
    environment:
      - HF_HOME=/tmp/hf_cache
      - FASTEMBED_CACHE_PATH=/tmp/fastembed_cache
    volumes:
      - ./indexes:/app/indexes
      - fastembed_cache:/tmp/fastembed_cache
      - hf_cache:/tmp/hf_cache
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL}
    container_name: psx_frontend
    restart: always
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend

volumes:
  fastembed_cache:
  hf_cache:
