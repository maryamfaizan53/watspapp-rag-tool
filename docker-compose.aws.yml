version: "3.9"

# AWS EC2 Free Tier — full self-hosted stack
# Identical layout to Oracle; uses the same nginx/oracle.conf + Let's Encrypt certs
# DuckDNS domain psx-chatbot.duckdns.org simply points to the AWS IP instead

services:

  db:
    image: postgres:16-alpine
    container_name: psx_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-psx_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-psx_chatbot}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-psx_user} -d ${POSTGRES_DB:-psx_chatbot}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2-alpine
    container_name: psx_redis
    restart: always
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru --save 60 1
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: psx_backend
    restart: always
    env_file: .env.prod
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-psx_user}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-psx_chatbot}
      REDIS_URL: redis://redis:6379
      HF_HOME: /tmp/hf_cache
      FASTEMBED_CACHE_PATH: /tmp/fastembed_cache
    volumes:
      - ./indexes:/app/indexes
      - fastembed_cache:/tmp/fastembed_cache
      - hf_cache:/tmp/hf_cache
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
    container_name: psx_frontend
    restart: always
    depends_on:
      backend:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: psx_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/oracle.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/certs:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  redis_data:
  fastembed_cache:
  hf_cache:
