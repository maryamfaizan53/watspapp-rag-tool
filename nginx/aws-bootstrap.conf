# HTTP-only bootstrap — used once to get the Let's Encrypt cert
# After certbot succeeds, nginx is restarted with oracle.conf (full HTTPS)
server {
    listen 80;
    server_name _;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 200 'OK — cert bootstrap in progress';
        add_header Content-Type text/plain;
    }
}
